<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>강서구 쓰레기통 설치 우선지역 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1d2430;
      --muted: #687385;
      --line: #d8dee8;
      --accent: #1967d2;
      --trash: #2f7d32;
      --bus: #f59f00;
      --metro: #6f42c1;
      --park: #137a35;
      --recommend: #d93025;
      --candidate: #c2410c;
      --shadow: 0 12px 30px rgba(24, 39, 75, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Malgun Gothic", sans-serif;
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      height: 100vh;
      min-height: 640px;
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfe;
    }

    .stat b {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 12px 8px;
      font-size: 14px;
      font-weight: 800;
    }

    .layer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 0 12px 12px;
    }

    label.layer {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    label.layer input {
      width: 15px;
      height: 15px;
      margin: 0;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 8px;
      align-items: center;
      padding: 0 12px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .control-row select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .clear-selection {
      margin: 0 12px 8px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .clear-selection:disabled {
      color: #9aa4b2;
      background: #f4f6f9;
      cursor: default;
    }

    .candidate-summary {
      margin: 0 12px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fbfcfe;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .candidate-summary strong {
      color: var(--text);
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .tab-button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-button.active {
      border-color: var(--accent);
      background: #eef5ff;
      color: var(--accent);
    }

    .tab-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .tab-panel.active {
      display: flex;
    }

    #tab-recommend > .panel:first-child {
      position: sticky;
      top: 0;
      z-index: 6;
      overflow: hidden;
      isolation: isolate;
      background: var(--panel);
      box-shadow: 0 8px 20px rgba(24, 39, 75, 0.10);
    }

    #tab-recommend > .panel:first-child::before {
      content: "";
      position: absolute;
      inset: -18px -18px 0;
      z-index: -1;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .analysis-card {
      padding: 0 12px 12px;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fbfcfe;
    }

    .metric b {
      display: block;
      font-size: 18px;
    }

    .metric span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .mini-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 0 12px 12px;
    }

    .mini-item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 12px;
      line-height: 1.4;
      text-align: left;
    }

    button.mini-item {
      cursor: pointer;
    }

    button.mini-item:hover {
      border-color: #a7bddc;
      background: #f8fbff;
    }

    .mini-item strong {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .complaint-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .complaint-meta span {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 6px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 11px;
    }

    .complaint-detail {
      margin-top: 7px;
      border-top: 1px solid var(--line);
      padding-top: 7px;
    }

    .complaint-detail summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
    }

    .complaint-detail p {
      margin: 7px 0 0;
      color: #344054;
      white-space: pre-wrap;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 11px;
    }

    .muted {
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 auto;
    }

    .rank-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .rank-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      cursor: pointer;
    }

    .rank-item:hover {
      border-color: #a7bddc;
      background: #f8fbff;
    }

    .rank-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
    }

    .score {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .rank-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px 10px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .bar {
      height: 7px;
      margin-top: 9px;
      border-radius: 999px;
      background: #e8edf5;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #f9ab00, #d93025);
    }

    .rank-item.active {
      border-color: var(--accent);
      background: #eef5ff;
      box-shadow: 0 0 0 2px rgba(25, 103, 210, 0.12);
    }

    main {
      position: relative;
      min-width: 0;
    }

    #map {
      position: absolute;
      inset: 0;
      background: #dfe7ef;
    }

    .legend {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 500;
      width: 250px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 1.5;
    }

    .legend b {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .leaflet-popup-content {
      min-width: 210px;
      margin: 12px 14px;
      line-height: 1.45;
      font-size: 13px;
    }

    .popup-title {
      margin-bottom: 6px;
      font-weight: 800;
      font-size: 15px;
    }

    .popup-kv {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 3px 8px;
      color: #2f3947;
      font-size: 12px;
    }

    .marker {
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
    }

    .marker-trash {
      width: 25px;
      height: 25px;
      border: 2px solid var(--trash);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.26);
    }

    .marker-bus {
      width: 25px;
      height: 25px;
      border: 2px solid var(--bus);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.26);
    }

    .marker-metro {
      width: 25px;
      height: 25px;
      border: 2px solid var(--metro);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.26);
    }

    .marker-park {
      width: 25px;
      height: 25px;
      border: 2px solid var(--park);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.26);
    }

    .marker-icon svg,
    .marker-park svg,
    .map-icon svg {
      filter: none;
    }

    .marker-icon svg {
      width: 17px;
      height: 18px;
    }

    .marker-park svg {
      width: 19px;
      height: 15px;
    }

    .map-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 22px;
    }

    .map-icon svg {
      width: 18px;
      height: 18px;
    }

    .marker-rec {
      width: 31px;
      height: 31px;
      background: var(--recommend);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    .marker-candidate {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--candidate);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
    }

    .leaflet-control-zoom {
      border: 0 !important;
      box-shadow: var(--shadow);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 42vh 58vh;
      }

      aside {
        order: 2;
        border-right: 0;
        border-top: 1px solid var(--line);
      }

      main {
        order: 1;
      }

      .legend {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <header>
        <h1>강서구 쓰레기통 설치 우선지역</h1>
        <p class="subtitle">AHP식 우선순위, K-means 유형, 주요 시설 최단거리 분석 결과</p>
      </header>

      <section class="stat-grid" aria-label="데이터 요약">
        <div class="stat"><b id="statTrash">0</b><span>설치 쓰레기통 위치</span></div>
        <div class="stat"><b id="statBus">0</b><span>버스정류장</span></div>
        <div class="stat"><b id="statMetro">0</b><span>지하철역</span></div>
        <div class="stat"><b id="statPark">0</b><span>공원</span></div>
      </section>

      <div class="tabs" role="tablist" aria-label="분석 탭">
        <button class="tab-button active" type="button" data-tab="recommend">설치 추천</button>
        <button class="tab-button" type="button" data-tab="complaint">민원 분석</button>
      </div>

      <div class="tab-panel active" id="tab-recommend">
        <section class="panel" aria-label="지도 레이어">
          <div class="panel-title">지도 레이어</div>
          <div class="layer-grid">
            <label class="layer"><input type="checkbox" data-layer="boundary" checked><span style="width:20px;border-top:2px solid #7d8da6;display:inline-block"></span>행정경계</label>
            <label class="layer"><input type="checkbox" data-layer="candidate" checked><span class="dot" style="background:var(--candidate)"></span>쓰레기통 추천</label>
            <label class="layer"><input type="checkbox" data-layer="service" checked><span style="width:20px;border-top:2px dashed var(--trash);display:inline-block"></span>서비스 반경</label>
            <label class="layer"><input type="checkbox" data-layer="trash" checked><span class="map-icon" data-legend-icon="trash"></span>쓰레기통</label>
            <label class="layer"><input type="checkbox" data-layer="bus" checked><span class="map-icon" data-legend-icon="bus"></span>버스정류장</label>
            <label class="layer"><input type="checkbox" data-layer="metro" checked><span class="map-icon" data-legend-icon="metro"></span>지하철역</label>
            <label class="layer"><input type="checkbox" data-layer="park" checked><span class="map-icon" data-legend-icon="park"></span>공원</label>
          </div>
          <div class="control-row">
            <span>기존 쓰레기통 서비스 반경</span>
            <select id="radiusSelect" aria-label="서비스 반경">
              <option value="100" selected>100m</option>
              <option value="150">150m</option>
              <option value="200">200m</option>
              <option value="250">250m</option>
            </select>
          </div>
          <button class="clear-selection" id="clearSelection" type="button" disabled>선택 해제</button>
          <div class="candidate-summary" id="candidateSummary">
            행정동별 권장 추가 설치 수 기준으로 추천 후보를 표시합니다.
          </div>
        </section>

        <section class="panel" aria-label="우선순위">
          <div class="panel-title">종합 우선순위</div>
          <div class="rank-list" id="rankList"></div>
        </section>
      </div>

      <div class="tab-panel" id="tab-complaint">
        <section class="panel" aria-label="민원 요약">
          <div class="panel-title">민원 요약</div>
          <div class="analysis-card">
            <div class="analysis-grid">
              <div class="metric"><b id="complaintDongName">전체</b><span>선택 행정동</span></div>
              <div class="metric"><b id="complaintDongCount">0</b><span>최근 5년 민원</span></div>
              <div class="metric"><b id="complaintLatestDate">-</b><span>최근 민원일</span></div>
              <div class="metric"><b id="complaintTopType">-</b><span>주요 민원 유형</span></div>
            </div>
          </div>
          <div class="mini-list" id="complaintTypeList"></div>
        </section>

        <section class="panel" aria-label="최근 민원">
          <div class="panel-title">최근 민원</div>
          <div class="mini-list" id="complaintRecentList"></div>
        </section>

        <section class="panel" aria-label="민원 상위 행정동">
          <div class="panel-title">민원 상위 행정동</div>
          <div class="mini-list" id="complaintRankList"></div>
        </section>
      </div>
    </aside>

    <main>
      <div id="map"></div>
      <div class="legend">
        <b>추천 후보 해석</b>
        <div class="legend-row"><span class="dot" style="background:var(--candidate)"></span>쓰레기통 설치 추천 후보</div>
        <div class="legend-row"><span style="width:20px;border-top:2px dashed var(--trash);display:inline-block"></span>선택 동 기존 쓰레기통 서비스 반경</div>
        <div class="legend-row"><span style="width:20px;border-top:2px dashed #1967d2;display:inline-block"></span>선택 행정동 경계</div>
        <div class="legend-row"><span class="map-icon" data-legend-icon="trash"></span>기존 설치 쓰레기통</div>
        <div class="legend-row"><span class="map-icon" data-legend-icon="bus"></span>버스정류장</div>
        <div class="legend-row"><span class="map-icon" data-legend-icon="metro"></span>지하철역</div>
        <div class="legend-row"><span class="map-icon" data-legend-icon="park"></span>공원</div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./data.js"></script>
  <script src="./boundaries.js"></script>
  <script>
    const data = window.GANGSEO_DATA;
    const boundaries = window.GANGSEO_BOUNDARIES;
    const fmt = new Intl.NumberFormat("ko-KR");
    const scoreMax = Math.max(...data.results.map((d) => Number(d.priority_score)));

    const map = L.map("map", {
      preferCanvas: true,
      zoomControl: true
    }).setView(data.meta.center, 13);
    map.createPane("outsideMaskPane");
    map.getPane("outsideMaskPane").style.zIndex = 330;
    map.getPane("outsideMaskPane").style.pointerEvents = "none";
    map.createPane("selectedBoundaryPane");
    map.getPane("selectedBoundaryPane").style.zIndex = 655;
    map.getPane("selectedBoundaryPane").style.pointerEvents = "none";
    map.createPane("serviceRadiusPane");
    map.getPane("serviceRadiusPane").style.zIndex = 430;
    map.getPane("serviceRadiusPane").style.pointerEvents = "none";
    map.createPane("candidateRadiusPane");
    map.getPane("candidateRadiusPane").style.zIndex = 690;
    map.getPane("candidateRadiusPane").style.pointerEvents = "none";
    map.createPane("candidateMarkerPane");
    map.getPane("candidateMarkerPane").style.zIndex = 720;

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const layers = {
      boundary: L.layerGroup().addTo(map),
      recommend: L.layerGroup(),
      candidate: L.layerGroup().addTo(map),
      service: L.layerGroup().addTo(map),
      trash: L.layerGroup().addTo(map),
      bus: L.layerGroup().addTo(map),
      metro: L.layerGroup().addTo(map),
      park: L.layerGroup().addTo(map)
    };
    const highlightLayer = L.layerGroup().addTo(map);
    const outsideMaskLayer = L.layerGroup().addTo(map);
    const boundaryByDong = new Map();
    let activeDongCode = null;

    boundaries.features.forEach((feature) => {
      const code = String(feature.properties.dong_code);
      boundaryByDong.set(code, feature);
    });

    const parkIconHtml = `
      <svg viewBox="0 0 68 48" role="img" aria-label="공원">
        <g fill="none" stroke="var(--park)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="17" r="14"></circle>
          <path d="M18 17v25"></path>
          <path d="M11 24l7 7 7-12"></path>
          <path d="M34 29h21"></path>
          <path d="M37 29v12"></path>
          <path d="M54 29v12"></path>
          <path d="M31 41h30"></path>
          <path d="M56 30c6-2 9-6 9-12 0-8-6-14-14-14-7 0-13 5-14 12"></path>
        </g>
      </svg>
    `;

    const trashIconHtml = `
      <svg viewBox="0 0 48 56" role="img" aria-label="쓰레기통">
        <g fill="none" stroke="var(--trash)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 14h20"></path>
          <path d="M19 9h10"></path>
          <path d="M10 18h28"></path>
          <path d="M14 18l3 31h14l3-31"></path>
          <path d="M21 25v17"></path>
          <path d="M27 25v17"></path>
        </g>
      </svg>
    `;

    const busIconHtml = `
      <svg viewBox="0 0 48 56" role="img" aria-label="버스정류장">
        <g fill="none" stroke="var(--bus)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">

    data.recommendations.forEach((d) => {

    const toRad = (deg) => deg * Math.PI / 180;
    const distanceMeters = (a, b) => {
      const R = 6371000;
      const dLat = toRad(b.latitude - a.latitude);
      const dLng = toRad(b.longitude - a.longitude);
      const lat1 = toRad(a.latitude);
      const lat2 = toRad(b.latitude);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    };

    const nearestTrash = (facility) => {
      let nearest = null;
      let distance = Infinity;
      data.trash.forEach((trash) => {
        const d = distanceMeters(facility, trash);
        if (d < distance) {
          distance = d;
          nearest = trash;
        }
      });
      return { nearest, distance };
    };

    const resultByDong = new Map(data.results.map((d) => [String(d.dong_code), d]));
    const maxPriorityScore = Math.max(...data.results.map((d) => Number(d.priority_score) || 0), 1);
    const maxCommercialStore = Math.max(...data.results.map((d) => Number(d.commercial_store_count) || 0), 1);
    const shortageScores = data.results.map((d) => Number(d.log_floating_population_per_bin) || 0);
    const minShortageScore = Math.min(...shortageScores);
    const maxShortageScore = Math.max(...shortageScores);
    const complaintDensityScores = data.results.map((d) => Number(d.complaint_per_10000_float) || 0);
    const minComplaintDensityScore = Math.min(...complaintDensityScores);
    const maxComplaintDensityScore = Math.max(...complaintDensityScores);
    const hwagokDongCodes = new Set(["11500540", "11500550", "11500560", "11500570", "11500590", "11500591", "11500593"]);
    const targetDongCodes = new Set(data.results.map((d) => String(d.dong_code)));
    let installCandidates = [];
    let allFacilityCandidates = [];
    let currentSelectedCandidates = [];

    const normalizeRange = (value, min, max) => {
      if (!Number.isFinite(value) || max <= min) return 0;
      return Math.min(Math.max((value - min) / (max - min), 0), 1);
    };

    const recommendedCandidateCount = (dongCode) => {
      const result = resultByDong.get(String(dongCode)) || {};
      const shortage = normalizeRange(
        Number(result.log_floating_population_per_bin) || 0,
        minShortageScore,
        maxShortageScore
      );
      const priority = (Number(result.priority_score) || 0) / maxPriorityScore;
      const complaintDensity = normalizeRange(
        Number(result.complaint_per_10000_float) || 0,
        minComplaintDensityScore,
        maxComplaintDensityScore
      );
      const commercial = (Number(result.commercial_store_count) || 0) / maxCommercialStore;
      const lowBinBonus = Number(result.total_bin_count) <= 3 ? 1 : 0;
      const needScore = shortage * 0.40 + priority * 0.30 + complaintDensity * 0.15 + commercial * 0.15;
      return Math.min(8, Math.max(1, Math.round(1 + needScore * 7) + lowBinBonus));
    };

    const isFarFromSelected = (candidate, selected, spacing) => (
      !selected.some((picked) => distanceMeters(candidate, picked) < spacing)
    );

    const candidateSpacingForRadius = (radius) => (
      radius * 1.5
    );

    const existingClearanceForRadius = (radius) => (
      radius * 2
    );

    const appendCandidates = (selected, candidates, targetCount, spacing) => {
      for (const candidate of candidates) {
        if (selected.length >= targetCount) break;
        if (!isFarFromSelected(candidate, selected, spacing)) continue;
        selected.push({ ...candidate, sequence: selected.length + 1 });
      }
      return selected;
    };

    const facilityRows = [
      ...data.busStops.map((d) => ({ ...d, facilityType: "버스정류장", facilityName: d.stop_name || d.node_id })),
      ...data.metro.map((d) => ({ ...d, facilityType: "지하철역", facilityName: `${d.station_name || ""}${d.line ? ` (${d.line})` : ""}` }))
    ];

    const noInstallZones = [];

    const riverGapNoInstallZones = [
      // 공백지역 후보만 한강 수면 내부를 제외합니다. 버스정류장/지하철 후보에는 적용하지 않습니다.
      [
        [37.5660, 126.7850],
        [37.5905, 126.7850],
        [37.5905, 126.8380],
        [37.5820, 126.8720],
        [37.5680, 126.8890],
        [37.5630, 126.8780],
        [37.5620, 126.8480],
        [37.5640, 126.8150]
      ]
    ];

    const noLastResortGapDongCodes = new Set([
      "11500530", // Deungchon 2-dong: Bongjesan
      "11500535", // Deungchon 3-dong: Han River edge
      "11500591", // Hwagok 6-dong: Bongjesan
      "11500603", // Gayang 1-dong: Han River / large parks
      "11500604", // Gayang 2-dong: Han River edge
      "11500605", // Gayang 3-dong: Han River edge
      "11500611", // Balsan 1-dong: Suryongsan / large green area
      "11500615", // Ujangsan-dong: Ujangsan
      "11500620", // Gonghang-dong: airport / large restricted land
      "11500630", // Banghwa 1-dong: large green area
      "11500640", // Banghwa 2-dong: Han River / Gaehwasan
      "11500641"  // Banghwa 3-dong: Han River / green area
    ]);

    const allowsLastResortGap = (dongCode) => (
      !noLastResortGapDongCodes.has(String(dongCode))
    );

    const noInstallCircles = [];

    const isPointInPolygon = (point, polygon) => {
      const [lat, lng] = point;
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const [latI, lngI] = polygon[i];
        const [latJ, lngJ] = polygon[j];
        const crosses = (lngI > lng) !== (lngJ > lng);
        const latAtLng = (latJ - latI) * (lng - lngI) / ((lngJ - lngI) || 1e-12) + latI;
        if (crosses && lat < latAtLng) inside = !inside;
      }
      return inside;
    };

    const isHardNoInstallPoint = (point) => {
      const lat = Number(point.latitude);
      const lng = Number(point.longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return true;
      return noInstallZones.some((zone) => isPointInPolygon([lat, lng], zone));
    };

    const isNoInstallPoint = (point) => {
      const lat = Number(point.latitude);
      const lng = Number(point.longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return true;
      if (riverGapNoInstallZones.some((zone) => isPointInPolygon([lat, lng], zone))) return true;
      return noInstallCircles.some((zone) => (
        distanceMeters(point, zone) < zone.radius
      ));
    };

    const facilityTypeWeight = {
      "지하철역": 1,
      "버스정류장": 0.85,
      "공원": 0.7,
      "공백지역": 0.45
    };

    const candidateScoreParts = (candidate, coverageDistance) => {
      const radius = Number(document.getElementById("radiusSelect").value);
      const result = resultByDong.get(String(candidate.dong_code)) || {};
      const priority = ((Number(result.priority_score) || 0) / maxPriorityScore) * 20;
      const distance = Math.min(coverageDistance / Math.max(radius * 3, 1), 1) * 20;
      const commercial = ((Number(result.commercial_store_count) || 0) / maxCommercialStore) * 20;
      const facility = (facilityTypeWeight[candidate.facilityType] || 0.5) * 20;
      const total = priority * 0.40 + distance * 0.30 + commercial * 0.20 + facility * 0.10;
      return { priority, distance, commercial, facility, total };
    };

    const withCandidateScore = (candidate, coverageDistance) => {
      const parts = candidateScoreParts(candidate, coverageDistance);
      return {
        ...candidate,
        nearestTrashDistance: coverageDistance,
        candidateScore: parts.total,
        scorePriority: parts.priority,
        scoreDistance: parts.distance,
        scoreCommercial: parts.commercial,
        scoreFacility: parts.facility
      };
    };

    const buildCandidates = () => {
      const radius = Number(document.getElementById("radiusSelect").value);
      const existingClearance = existingClearanceForRadius(radius);
      allFacilityCandidates = facilityRows
        .filter((facility) => targetDongCodes.has(String(facility.dong_code)))
        .map((facility) => {
          const near = nearestTrash(facility);
          const result = resultByDong.get(String(facility.dong_code));
          return {
            ...facility,
            nearestTrashDistance: near.distance,
            nearestTrashId: near.nearest?.trash_location_id,
            priorityRank: result?.priority_rank ?? 999,
            priorityScore: result?.priority_score ?? 0,
            outsideService: near.distance >= existingClearance
          };
        });
      installCandidates = allFacilityCandidates
        .filter((candidate) => candidate.outsideService)
        .sort((a, b) => b.nearestTrashDistance - a.nearestTrashDistance || a.priorityRank - b.priorityRank)
    };

    const updateCandidateSummary = (dongCode, total, shown, fallbackMode = false, targetCount = null) => {
      const summary = document.getElementById("candidateSummary");
      const dong = data.results.find((d) => String(d.dong_code) === String(dongCode));
      if (!dongCode || !dong) {
        summary.innerHTML = `<strong>강서구 전체 보기</strong><br>행정동별 권장 추가 설치 수 기준으로 현재 추천 가능 후보 ${shown}개를 표시합니다.`;
        return;
      }
      const shortageText = targetCount && shown < targetCount
        ? `<br><span class="muted">부족한 ${targetCount - shown}개는 현장 조사 또는 추가 후보 데이터 보완이 필요합니다.</span>`
        : "";
      summary.innerHTML = `<strong>${dong.dong_name}</strong><br>권장 추가 설치 ${targetCount || shown}개 / 현재 추천 가능 후보 ${shown}개 표시${shortageText}`;
    };

    const nearestCoverageDistance = (facility, coveragePoints) => {
      let distance = Infinity;
      coveragePoints.forEach((point) => {
        distance = Math.min(distance, distanceMeters(facility, point));
      });
      return distance;
    };

    const boundaryRings = (feature) => {
      const polygons = feature.geometry.type === "MultiPolygon"
        ? feature.geometry.coordinates
        : [feature.geometry.coordinates];
      return polygons.flatMap((polygon) => polygon.map((ring) => ring.map(([lng, lat]) => [lat, lng])));
    };

    const isPointInRing = (point, ring) => {
      const [lat, lng] = point;
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [latI, lngI] = ring[i];
        const [latJ, lngJ] = ring[j];
        const crosses = (lngI > lng) !== (lngJ > lng);
        const latAtLng = (latJ - latI) * (lng - lngI) / ((lngJ - lngI) || 1e-12) + latI;
        if (crosses && lat < latAtLng) inside = !inside;
      }
      return inside;
    };

    const isPointInBoundary = (lat, lng, feature) => {
      const rings = boundaryRings(feature);
      return rings.some((ring) => isPointInRing([lat, lng], ring));
    };

    const resultAtLatLng = (latlng) => {
      const feature = boundaries.features.find((item) => isPointInBoundary(latlng.lat, latlng.lng, item));
      if (!feature) return null;
      const code = String(feature.properties.dong_code);
      return data.results.find((d) => String(d.dong_code) === code) || null;
    };

    const boundaryBounds = (feature) => {
      const points = boundaryRings(feature).flat();
      const lats = points.map((p) => p[0]);
      const lngs = points.map((p) => p[1]);
      return {
        minLat: Math.min(...lats),
        maxLat: Math.max(...lats),
        minLng: Math.min(...lngs),
        maxLng: Math.max(...lngs)
      };
    };

    const selectGapCandidates = (dongCode, limit = Infinity, existingSelected = [], options = {}) => {
      const boundary = boundaryByDong.get(String(dongCode));
      if (!boundary) return [];
      const requireRoadAnchor = options.requireRoadAnchor !== false;
      const result = resultByDong.get(String(dongCode)) || {};
      const radius = Number(document.getElementById("radiusSelect").value);
      const gapCandidateSpacing = candidateSpacingForRadius(radius);
      const existingClearance = existingClearanceForRadius(radius);
      const bounds = boundaryBounds(boundary);
      const midLat = (bounds.minLat + bounds.maxLat) / 2;
      const stepMeters = Math.max(55, radius * 0.45);
      const stepLat = stepMeters / 111320;
      const stepLng = stepMeters / (111320 * Math.max(Math.cos(toRad(midLat)), 0.25));
      const coveragePoints = [
        ...data.trash.map((trash) => ({
          latitude: Number(trash.latitude),
          longitude: Number(trash.longitude)
        })),
        ...existingSelected.map((candidate) => ({
          latitude: Number(candidate.latitude),
          longitude: Number(candidate.longitude)
        }))
      ];
      const roadAnchorPoints = [
        ...data.busStops,
        ...data.metro
      ]
        .filter((facility) => String(facility.dong_code) === String(dongCode))
        .map((facility) => ({
          latitude: Number(facility.latitude),
          longitude: Number(facility.longitude)
        }))
        .filter((point) => Number.isFinite(point.latitude) && Number.isFinite(point.longitude));
      const roadAnchorLimit = Math.min(Math.max(radius * 0.9, 110), 180);
      const pool = [];

      for (let lat = bounds.minLat; lat <= bounds.maxLat; lat += stepLat) {
        for (let lng = bounds.minLng; lng <= bounds.maxLng; lng += stepLng) {
          if (!isPointInBoundary(lat, lng, boundary)) continue;
          const point = { latitude: lat, longitude: lng };
          if (isNoInstallPoint(point)) continue;
          const roadAnchorDistance = roadAnchorPoints.length ? nearestCoverageDistance(point, roadAnchorPoints) : Infinity;
          if (requireRoadAnchor && roadAnchorDistance > roadAnchorLimit) continue;
          const coverageDistance = nearestCoverageDistance(point, coveragePoints);
          if (coverageDistance < existingClearance) continue;
          const parts = candidateScoreParts({ dong_code: dongCode, facilityType: "공백지역" }, coverageDistance);
          pool.push({
            dong_code: dongCode,
            dong_name: result.dong_name,
            latitude: lat,
            longitude: lng,
            facilityType: "공백지역",
            facilityName: "쓰레기통 서비스 공백지역",
            priorityRank: result.priority_rank ?? 999,
            priorityScore: result.priority_score ?? 0,
            nearestTrashDistance: coverageDistance,
            candidateScore: parts.total,
            gapCandidate: true,
            lastResortGap: !requireRoadAnchor
          });
        }
      }

      const selected = [];
      while (pool.length && selected.length < limit) {
        let bestIndex = -1;
        let bestDistance = -1;
        let bestScore = -1;
        pool.forEach((candidate, index) => {
          const coverageDistance = nearestCoverageDistance(candidate, coveragePoints);
          if (coverageDistance < existingClearance) return;
          const parts = candidateScoreParts(candidate, coverageDistance);
          if (coverageDistance > bestDistance || (coverageDistance === bestDistance && parts.total > bestScore)) {
            bestDistance = coverageDistance;
            bestScore = parts.total;
            bestIndex = index;
          }
        });
        if (bestIndex < 0) break;
        const chosen = {
          ...pool.splice(bestIndex, 1)[0],
          nearestTrashDistance: bestDistance,
          candidateScore: bestScore,
          sequence: selected.length + 1
        };
        selected.push(chosen);
        coveragePoints.push({
          latitude: Number(chosen.latitude),
          longitude: Number(chosen.longitude)
        });
        for (let i = pool.length - 1; i >= 0; i--) {
          if (distanceMeters(pool[i], chosen) < gapCandidateSpacing) {
            pool.splice(i, 1);
          }
        }
      }
      return selected;
    };

    const selectGreedyCandidates = (dongCode) => {
      const radius = Number(document.getElementById("radiusSelect").value);
      const candidateSpacing = candidateSpacingForRadius(radius);
      const existingClearance = existingClearanceForRadius(radius);
      const coveragePoints = data.trash.map((trash) => ({
        latitude: Number(trash.latitude),
        longitude: Number(trash.longitude)
      }));
      const pool = allFacilityCandidates
        .filter((d) => String(d.dong_code) === String(dongCode))
        .filter((d) => d.outsideService)
        .map((d) => withCandidateScore(d, d.nearestTrashDistance));
      const initialOutsideCount = pool.length;
      const selected = [];

      while (pool.length) {
        let bestIndex = -1;
        let bestDistance = -1;
        let bestScore = -1;
        pool.forEach((candidate, index) => {
          const coverageDistance = nearestCoverageDistance(candidate, coveragePoints);
          if (coverageDistance < existingClearance) return;
          const parts = candidateScoreParts(candidate, coverageDistance);
          if (coverageDistance > bestDistance || (coverageDistance === bestDistance && parts.total > bestScore)) {
            bestDistance = coverageDistance;
            bestScore = parts.total;
            bestIndex = index;
          }
        });
        if (bestIndex < 0) break;
        const chosen = {
          ...pool.splice(bestIndex, 1)[0],
          nearestTrashDistance: bestDistance,
          candidateScore: bestScore,
          sequence: selected.length + 1
        };
        selected.push(chosen);
        coveragePoints.push({
          latitude: Number(chosen.latitude),
          longitude: Number(chosen.longitude)
        });
        for (let i = pool.length - 1; i >= 0; i--) {
          if (distanceMeters(pool[i], chosen) < candidateSpacing) {
            pool.splice(i, 1);
          }
        }
      }

      return { selected, initialOutsideCount };
    };

    const selectCandidatesForDong = (dongCode) => {
      const radius = Number(document.getElementById("radiusSelect").value);
      const candidateSpacing = candidateSpacingForRadius(radius);
      const targetCount = recommendedCandidateCount(dongCode);
      const greedy = selectGreedyCandidates(dongCode);
      const selected = greedy.selected.slice(0, targetCount).map((candidate, index) => ({
        ...candidate,
        sequence: index + 1
      }));
      const anchoredGapCandidates = selected.length < targetCount
        ? selectGapCandidates(dongCode, targetCount - selected.length, selected, { requireRoadAnchor: true })
        : [];
      appendCandidates(selected, anchoredGapCandidates, targetCount, candidateSpacing);
      const lastResortGapCandidates = selected.length < targetCount && allowsLastResortGap(dongCode)
        ? selectGapCandidates(dongCode, targetCount - selected.length, selected, { requireRoadAnchor: false })
        : [];
      appendCandidates(selected, lastResortGapCandidates, targetCount, candidateSpacing);
      const gapCandidates = [
        ...anchoredGapCandidates,
        ...lastResortGapCandidates
      ];
      return {
        selected: selected.slice(0, targetCount).map((candidate, index) => ({
          ...candidate,
          sequence: index + 1
        })),
        greedy,
        gapCandidates,
        targetCount
      };
    };

    const selectDefaultCandidates = () => {
      const defaultDongs = data.results
        .slice()
        .sort((a, b) => Number(a.priority_rank) - Number(b.priority_rank));
      return defaultDongs.flatMap((dong) => {
        const { selected } = selectCandidatesForDong(dong.dong_code);
        return selected.map((candidate, index) => ({
          ...candidate,
          sequence: dong.priority_rank,
          defaultCandidate: true,
          defaultOrder: index + 1
        }));
      });
    };

    const renderCandidateLayer = (dongCode = null) => {
      layers.candidate.clearLayers();
      buildCandidates();
      if (!dongCode) {
        const selected = selectDefaultCandidates();
        currentSelectedCandidates = [];
        updateCandidateSummary(null, 0, selected.length);
        selected.forEach((d) => {
          L.marker([d.latitude, d.longitude], {
            icon: markerIcon("marker-candidate", d.sequence || ""),
            pane: "candidateMarkerPane",
            bubblingMouseEvents: true
          })
            .bindPopup(popup(`${d.facilityName}`, [
              ["표시 기준", "강서구 전체 우선 후보"],
              ["후보 점수", `${Number(d.candidateScore || 0).toFixed(2)}점`],
              ["후보 유형", d.facilityType],
              ["행정동", d.dong_name],
              ["종합 순위", `${d.priorityRank}위`],
              ["최근접 쓰레기통", `${Math.round(d.nearestTrashDistance)}m`],
              ["상권 점포", `${fmt.format(resultByDong.get(String(d.dong_code))?.commercial_store_count || 0)}개`],
              ["판단", d.gapCandidate ? "시설권 내 쓰레기통 공백지역" : d.fallbackCandidate ? "반경 내 점수 상위 주요시설" : "서비스 반경 밖 점수 상위 주요시설"]
            ]))
            .addTo(layers.candidate);
        });
        return;
      }
      const { selected, greedy, gapCandidates, targetCount } = selectCandidatesForDong(dongCode);
      currentSelectedCandidates = selected;

      updateCandidateSummary(
        dongCode,
        greedy.initialOutsideCount,
        selected.length,
        greedy.selected.length ? false : gapCandidates.length ? "gap" : "facility",
        targetCount
      );

      selected.forEach((d) => {
        L.marker([d.latitude, d.longitude], {
          icon: markerIcon("marker-candidate", d.sequence || ""),
          pane: "candidateMarkerPane",
          bubblingMouseEvents: true
        })
          .bindPopup(popup(`${d.facilityName}`, [
            ["추천 순서", d.sequence ? `${d.sequence}번째` : "보완 후보"],
            ["후보 점수", `${Number(d.candidateScore || 0).toFixed(2)}점`],
            ["후보 유형", d.facilityType],
            ["행정동", d.dong_name],
            ["종합 순위", `${d.priorityRank}위`],
            ["최근접 쓰레기통", `${Math.round(d.nearestTrashDistance)}m`],
            ["상권 점포", `${fmt.format(resultByDong.get(String(d.dong_code))?.commercial_store_count || 0)}개`],
            ["판단", d.gapCandidate ? "시설권 내 쓰레기통 공백지역" : d.fallbackCandidate ? "반경 내 점수 상위 주요시설" : "서비스 반경 밖 점수 상위 주요시설"]
          ]))
          .addTo(layers.candidate);
      });
    };

    L.geoJSON(boundaries, {
      style: {
        color: "transparent",
        weight: 0,
        opacity: 0,
        fillOpacity: 0.015
      },
      onEachFeature: (feature, layer) => {
        const code = String(feature.properties.dong_code);
        const result = data.results.find((d) => String(d.dong_code) === code);
        layer.bindTooltip(feature.properties.dong_name, { sticky: true });
        layer.on("click", () => {
          if (result) showDongOutline(result);
        });
      }
    }).addTo(layers.boundary);

    map.on("click", (event) => {
      const result = resultAtLatLng(event.latlng);
      if (result) showDongOutline(result);
    });

    const pointsByDong = new Map();
    const addDongPoint = (d) => {
      if (!d.dong_code || !Number.isFinite(d.latitude) || !Number.isFinite(d.longitude)) return;
      const key = String(d.dong_code);
      if (!pointsByDong.has(key)) pointsByDong.set(key, []);
      pointsByDong.get(key).push([Number(d.latitude), Number(d.longitude)]);
    };
    [...data.trash, ...data.busStops, ...data.parks, ...data.metro].forEach(addDongPoint);

    const cross = (o, a, b) => (a[1] - o[1]) * (b[0] - o[0]) - (a[0] - o[0]) * (b[1] - o[1]);
    const convexHull = (points) => {
      const unique = [...new Map(points.map((p) => [`${p[0].toFixed(7)},${p[1].toFixed(7)}`, p])).values()]
        .sort((a, b) => a[1] === b[1] ? a[0] - b[0] : a[1] - b[1]);
      if (unique.length <= 2) return unique;
      const lower = [];
      for (const p of unique) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
        lower.push(p);
      }
      const upper = [];
      for (let i = unique.length - 1; i >= 0; i--) {
        const p = unique[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
        upper.push(p);
      }
      upper.pop();
      lower.pop();
      return lower.concat(upper);
    };

    const paddedBounds = (points) => {
      const bounds = L.latLngBounds(points.map((p) => L.latLng(p[0], p[1])));
      return bounds.pad(0.28);
    };

    const ringSegments = (feature) => {
      const coords = feature.geometry.coordinates;
      const polygons = feature.geometry.type === "MultiPolygon" ? coords : [coords];
      const segments = [];
      polygons.forEach((polygon) => {
        polygon.forEach((ring) => {
          for (let i = 0; i < ring.length - 1; i++) {
            const a = ring[i];
            const b = ring[i + 1];
            const keyA = `${a[0].toFixed(7)},${a[1].toFixed(7)}`;
            const keyB = `${b[0].toFixed(7)},${b[1].toFixed(7)}`;
            const key = keyA < keyB ? `${keyA}|${keyB}` : `${keyB}|${keyA}`;
            segments.push({ key, latlngs: [[a[1], a[0]], [b[1], b[0]]] });
          }
        });
      });
      return segments;
    };

    const boundaryOuterRings = () => {
      const rings = [];
      boundaries.features.forEach((feature) => {
        const polygons = feature.geometry.type === "MultiPolygon"
          ? feature.geometry.coordinates
          : [feature.geometry.coordinates];
        polygons.forEach((polygon) => {
          if (polygon[0]) {
            rings.push(polygon[0].map(([lng, lat]) => [lat, lng]));
          }
        });
      });
      return rings;
    };

    const renderOutsideMask = () => {
      const worldRing = [
        [85, -180],
        [85, 180],
        [-85, 180],
        [-85, -180]
      ];
      L.polygon([worldRing, ...boundaryOuterRings()], {
        interactive: false,
        pane: "outsideMaskPane",
        stroke: false,
        fill: true,
        fillColor: "#9aa0a6",
        fillOpacity: 0.48,
        fillRule: "evenodd"
      }).addTo(outsideMaskLayer);
    };

    const renderGangseoOutline = (fit = false) => {
      const segmentMap = new Map();
      boundaries.features.forEach((feature) => {
        ringSegments(feature).forEach((segment) => {
          if (!segmentMap.has(segment.key)) {
            segmentMap.set(segment.key, { count: 0, latlngs: segment.latlngs });
          }
          segmentMap.get(segment.key).count += 1;
        });
      });

      const outerLayer = L.layerGroup();
      segmentMap.forEach((segment) => {
        if (segment.count !== 1) return;
        L.polyline(segment.latlngs, {
          interactive: false,
          pane: "selectedBoundaryPane",
          color: "#ff2d55",
          weight: 4,
          opacity: 0.95
        }).addTo(outerLayer);
      });
      outerLayer.addTo(highlightLayer);

      if (fit) {
        const outlineBounds = L.latLngBounds(
          [...segmentMap.values()]
            .filter((segment) => segment.count === 1)
            .flatMap((segment) => segment.latlngs)
            .map((point) => L.latLng(point[0], point[1]))
        );
        if (outlineBounds.isValid()) {
          map.flyToBounds(outlineBounds.pad(0.08), { duration: 0.65, maxZoom: 13 });
        }
      }
    };

    const complaintByDong = new Map((data.complaintSummary || []).map((d) => [String(d.dong_code), d]));
    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
    const complaintTypeLabels = {
      CT01: "쓰레기통 설치 요청",
      CT02: "쓰레기통 관리",
      CT03: "무단투기",
      CT04: "흡연/담배꽁초",
      CT05: "공원 관련",
      CT06: "버스정류장 관련",
      CT07: "청소/환경정비",
      CT08: "생활쓰레기 배출",
      CT09: "기타"
    };
    const answerTypeLabels = {
      AT01: "설치 검토",
      AT02: "설치 불가",
      AT03: "조치 완료",
      AT04: "현장 확인 예정",
      AT05: "부서 이관/협조 요청",
      AT06: "안내/계도",
      AT07: "처리중/자동 안내",
      AT08: "기타"
    };
    const complaintTypeNameById = new Map(
      (data.complaintSummary || [])
        .flatMap((d) => d.type_counts || [])
        .map((d) => [d.complaint_type_id, complaintTypeLabels[d.complaint_type_id] || d.complaint_type_name || d.complaint_type_id])
    );
    const answerTypeNameById = new Map(Object.entries(answerTypeLabels));
    const complaintTypeLabel = (id, name) => complaintTypeLabels[id] || name || "미분류";
    const answerTypeLabel = (id, name) => answerTypeLabels[id] || name || "정보 없음";

    const renderComplaintPanel = (dongCode = null) => {
      const summaries = data.complaintSummary || [];
      const selected = dongCode ? complaintByDong.get(String(dongCode)) : null;
      const selectedDong = dongCode
        ? data.results.find((item) => String(item.dong_code) === String(dongCode))
        : null;
      const totalCount = summaries.reduce((sum, item) => sum + Number(item.complaint_count || 0), 0);
      const latestDate = summaries
        .map((item) => item.latest_date)
        .filter(Boolean)
        .sort()
        .at(-1) || "-";
      const view = dongCode
        ? (selected || {
          dong_code: dongCode,
          dong_name: selectedDong?.dong_name || "선택 행정동",
          complaint_count: 0,
          latest_date: "-",
          type_counts: [],
          recent_items: []
        })
        : {
        dong_name: "전체",
        complaint_count: totalCount,
        latest_date: latestDate,
        type_counts: summaries.flatMap((item) => item.type_counts || []),
        recent_items: summaries.flatMap((item) => (
          (item.recent_items || []).map((recent) => ({
            ...recent,
            dong_name: item.dong_name
          }))
        )).sort((a, b) => String(b.created_date).localeCompare(String(a.created_date)))
      };

      const typeTotals = new Map();
      (view.type_counts || []).forEach((item) => {
        const name = complaintTypeLabel(item.complaint_type_id, item.complaint_type_name);
        typeTotals.set(name, (typeTotals.get(name) || 0) + Number(item.count || 0));
      });
      const topTypes = [...typeTotals.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);

      document.getElementById("complaintDongName").textContent = view.dong_name || "전체";
      document.getElementById("complaintDongCount").textContent = `${fmt.format(view.complaint_count || 0)}건`;
      document.getElementById("complaintLatestDate").textContent = view.latest_date || "-";
      document.getElementById("complaintTopType").textContent = topTypes[0]?.[0] || "-";

      const typeList = document.getElementById("complaintTypeList");
      typeList.innerHTML = topTypes.length
        ? topTypes.map(([name, count]) => `
          <div class="mini-item">
            <strong><span>${name}</span><span>${fmt.format(count)}건</span></strong>
            <div class="bar"><span style="width:${Math.max(6, count / Math.max(topTypes[0][1], 1) * 100)}%"></span></div>
          </div>
        `).join("")
        : `<div class="mini-item">표시할 민원 유형 데이터가 없습니다.</div>`;

      const recentList = document.getElementById("complaintRecentList");
      recentList.innerHTML = (view.recent_items || []).length
        ? view.recent_items.map((item) => `
          <div class="mini-item">
            <strong><span>${escapeHtml(item.created_date)}</span><span>${escapeHtml(item.dong_name || view.dong_name || "")}</span></strong>
            <div>${escapeHtml(item.title || "제목 없음")}</div>
            <div class="complaint-meta">
              <span>민원번호 ${escapeHtml(item.complaint_no || "-")}</span>
              <span>${escapeHtml(item.department || "부서 정보 없음")}</span>
              <span>${escapeHtml(complaintTypeLabel(item.complaint_type_id, item.complaint_type_name || complaintTypeNameById.get(item.complaint_type_id)))}</span>
              <span>답변 ${escapeHtml(answerTypeLabel(item.answer_type_id, item.answer_type_name || answerTypeNameById.get(item.answer_type_id)))}</span>
            </div>
            <details class="complaint-detail">
              <summary>민원 내용 보기</summary>
              <p>${escapeHtml(item.content || "민원 내용 원문이 없습니다.")}</p>
            </details>
            <details class="complaint-detail">
              <summary>답변 내용 보기</summary>
              <p>${escapeHtml(item.answer || "답변 내용 원문이 없습니다.")}</p>
            </details>
          </div>
        `).join("")
        : `<div class="mini-item">${view.dong_name || "선택 행정동"}의 최근 5년 기준 민원 데이터가 없습니다.</div>`;

      const rankList = document.getElementById("complaintRankList");
      rankList.innerHTML = summaries
        .slice()
        .sort((a, b) => Number(b.complaint_count || 0) - Number(a.complaint_count || 0))
        .slice(0, 8)
        .map((item, index) => `
          <button class="mini-item" type="button" data-complaint-dong="${item.dong_code}">
            <strong><span>${index + 1}. ${item.dong_name}</span><span>${fmt.format(item.complaint_count || 0)}건</span></strong>
            <span class="muted">최근 민원일 ${item.latest_date || "-"}</span>
          </button>
        `).join("");
      rankList.querySelectorAll("[data-complaint-dong]").forEach((button) => {
        button.addEventListener("click", () => {
          const dong = data.results.find((item) => String(item.dong_code) === String(button.dataset.complaintDong));
          if (dong) showDongOutline(dong);
        });
      });
    };

    const scrollRankItemBelowSticky = (item) => {
      const sidebar = document.querySelector("aside");
      const stickyPanel = document.querySelector("#tab-recommend > .panel:first-child");
      if (!sidebar || !stickyPanel) {
        item.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
        return;
      }
      const itemRect = item.getBoundingClientRect();
      const stickyRect = stickyPanel.getBoundingClientRect();
      const targetTop = stickyRect.bottom + 12;
      sidebar.scrollBy({
        top: itemRect.top - targetTop,
        behavior: "smooth"
      });
    };

    const showDongOutline = (dong) => {
      activeDongCode = String(dong.dong_code);
      document.getElementById("clearSelection").disabled = false;
      renderComplaintPanel(dong.dong_code);
      highlightLayer.clearLayers();
      layers.service.clearLayers();
      renderFacilityLayers(dong.dong_code);
      renderCandidateLayer(dong.dong_code);
      document.querySelectorAll(".rank-item.active").forEach((el) => el.classList.remove("active"));
      const active = document.querySelector(`[data-dong-code="${dong.dong_code}"]`);
      if (active) {
        active.classList.add("active");
        scrollRankItemBelowSticky(active);
      }

      const boundary = boundaryByDong.get(String(dong.dong_code));
      if (boundary) {
        const selected = L.geoJSON(boundary, {
          interactive: false,
          style: {
            pane: "selectedBoundaryPane",
            color: "#1967d2",
            weight: 3,
            dashArray: "8 7",
            fill: true,
            fillColor: "#1967d2",
            fillOpacity: 0.04
          }
        }).bindPopup(popup(`${dong.dong_name} 행정동 경계`, [
          ["종합 순위", `${dong.priority_rank}위`],
          ["점수", Number(dong.priority_score).toFixed(2)],
          ["표시 기준", "행정동 GeoJSON 경계"]
        ])).addTo(highlightLayer);
        const radius = Number(document.getElementById("radiusSelect").value);
        data.trash
          .filter((trash) => String(trash.dong_code) === String(dong.dong_code))
          .forEach((trash) => {
            L.circle([trash.latitude, trash.longitude], {
              radius,
              interactive: false,
              pane: "serviceRadiusPane",
              color: "#2f7d32",
              weight: 1.4,
              dashArray: "5 6",
              fillColor: "#2f7d32",
              fillOpacity: 0.045,
              opacity: 0.75
            }).addTo(layers.service);
          });
        currentSelectedCandidates.forEach((candidate) => {
          if (candidate.fallbackCandidate) return;
          L.circle([candidate.latitude, candidate.longitude], {
            radius,
            interactive: false,
            pane: "candidateRadiusPane",
            color: "#c2410c",
            weight: 2.2,
            dashArray: "7 5",
            fillColor: "#c2410c",
            fillOpacity: 0.075,
            opacity: 0.95
          }).addTo(layers.service);
        });
        selected.bringToFront();
        map.flyToBounds(selected.getBounds().pad(0.12), { duration: 0.65, maxZoom: 15 });
        return;
      }

      const points = pointsByDong.get(String(dong.dong_code)) || [];
      if (!points.length) return;

      const hull = convexHull(points);
      if (hull.length >= 3) {
        L.polygon(hull, {
          interactive: false,
          color: "#1967d2",
          weight: 3,
          dashArray: "8 7",
          fill: true,
          fillColor: "#1967d2",
          fillOpacity: 0.08
        }).bindPopup(popup(`${dong.dong_name} 선택 영역`, [
          ["종합 순위", `${dong.priority_rank}위`],
          ["점수", Number(dong.priority_score).toFixed(2)],
          ["표시 기준", "보유 좌표 외곽선"]
        ])).addTo(highlightLayer);
        map.flyToBounds(paddedBounds(hull), { duration: 0.65, maxZoom: 15 });
      } else {
        const center = points[0];
        L.circle(center, {
          radius: 450,
          interactive: false,
          color: "#1967d2",
          weight: 3,
          dashArray: "8 7",
          fillColor: "#1967d2",
          fillOpacity: 0.08
        }).addTo(highlightLayer);
        map.flyTo(center, 15, { duration: 0.65 });
      }
    };

    const clearSelection = () => {
      activeDongCode = null;
      highlightLayer.clearLayers();
      layers.service.clearLayers();
      currentSelectedCandidates = [];
      renderComplaintPanel();
      document.querySelectorAll(".rank-item.active").forEach((el) => el.classList.remove("active"));
      document.getElementById("clearSelection").disabled = true;
      renderFacilityLayers();
      renderGangseoOutline(true);
      renderCandidateLayer();
    };

    document.querySelectorAll("[data-layer]").forEach((input) => {
      input.addEventListener("change", () => {
        const layer = layers[input.dataset.layer];
        if (input.checked) {
          layer.addTo(map);
        } else {
          map.removeLayer(layer);
        }
      });
    });

    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-tab]").forEach((item) => item.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.remove("active"));
        button.classList.add("active");
        const panel = document.getElementById(`tab-${button.dataset.tab}`);
        if (panel) panel.classList.add("active");
        if (button.dataset.tab === "complaint") {
          renderComplaintPanel(activeDongCode);
        }
      });
    });

    document.getElementById("radiusSelect").addEventListener("change", () => {
      if (activeDongCode) {
        const dong = data.results.find((d) => String(d.dong_code) === activeDongCode);
        if (dong) showDongOutline(dong);
      } else {
        renderCandidateLayer();
      }
    });

    document.getElementById("clearSelection").addEventListener("click", clearSelection);

    renderOutsideMask();
    renderFacilityLayers();
    renderGangseoOutline();
    renderCandidateLayer();
    renderComplaintPanel();

    document.getElementById("statTrash").textContent = fmt.format(data.trash.length);
    document.getElementById("statBus").textContent = fmt.format(data.busStops.length);
    document.getElementById("statMetro").textContent = fmt.format(data.metro.length);
    document.getElementById("statPark").textContent = fmt.format(data.parks.length);

    const recByDong = new Map(data.recommendations.map((d) => [String(d.dong_code), d]));
    const rankList = document.getElementById("rankList");
    data.results
      .slice()
      .sort((a, b) => Number(a.priority_rank) - Number(b.priority_rank))
      .forEach((d) => {
        const item = document.createElement("button");
        item.className = "rank-item";
        item.type = "button";
        item.dataset.dongCode = d.dong_code;
        item.innerHTML = `
          <div class="rank-head">
            <span>${d.priority_rank}. ${d.dong_name}</span>
            <span class="score">${Number(d.priority_score).toFixed(2)}</span>
          </div>
          <div class="rank-meta">
            <span>민원 ${fmt.format(d.complaint_count)}건</span>
            <span>쓰레기통 ${fmt.format(d.total_bin_count)}개</span>
            <span>면적당 유동 ${Number(d.floating_population_density || 0).toFixed(2)}</span>
            <span>상권 점포 ${fmt.format(d.commercial_store_count || 0)}개</span>
            <span>주요시설 거리 ${Number(d.weighted_access_distance).toFixed(1)}m</span>
          </div>
          <div class="bar"><span style="width:${Math.max(4, Number(d.priority_score) / scoreMax * 100)}%"></span></div>
        `;
        item.addEventListener("click", () => {
          showDongOutline(d);
        });
        rankList.appendChild(item);
      });
  </script>
</body>
</html>
